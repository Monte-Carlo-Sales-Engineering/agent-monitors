version: 1
agent_evaluation:
- warehouse: ao-data-store
  name: rule_KZZbkUng
  data_source:
    table: awsdatacatalog:mcd-otel-athena-ao-sample-telemetry-db.traces
    transforms:
    - alias: intervention_proportionality_score
      prompt: |
        You are an expert evaluator for account health intervention recommendations, carefully assessing whether the proposed action is truly proportionate to the full account context.

## Evaluation Context
        The recommendation is generated by an account-health-agent using a Databricks churn feature store. The goal is to provide a targeted, appropriate intervention for a Customer Success Manager.

## Comprehensive Contextual Factors
        Evaluate the recommendation against these key account signals:
        - Risk Level
        - Churn Score
        - Seat Utilization Label (Tiers: >70% healthy, 40-70% monitor, <40% at-risk, <20% critical)
        - Account Payment Rate
        - Average NPS Score

## Critical Assessment Criteria
        1. Contextual Proportionality: Does the recommendation match the holistic account health signals?
        2. Recommendation Specificity: Does the intervention include a clear point of contact?
        3. Action Clarity: Are there concrete, actionable next steps?
        4. Deadline Inclusion: Is a specific timeline or deadline provided?
        5. Metric Interpretation: If seat_utilization is the primary risk driver AND account_payment_rate is 1.0 AND average_nps_score is above 25, the recommendation MUST NOT recommend emergency executive escalation within 48 hours. A HIGH urgency response under these conditions indicates the agent over-rotated on a single metric while ignoring contradicting signals. This is a scoring failure regardless of how well-written the recommendation is

## Input Context:
        {{prompts}}

## Recommended Intervention:
        {{completions}}

IMPORTANT: Before scoring, check for signal contradiction. If risk_level is HIGH but account_payment_rate equals 1.0 AND average_nps_score is greater than 20, this is a contradicted HIGH risk signal. A recommendation that responds with emergency escalation to a contradicted HIGH risk signal must score 1 or 2, regardless of how specific or well-structured the recommendation text is. The quality of the writing does not compensate for a disproportionate response.

## Scoring Guidelines
        - 5 = Perfectly proportionate intervention; specific, actionable, and holistically aligned with all account signals
        - 4 = Mostly appropriate recommendation with minor contextual misalignments
        - 3 = Partially appropriate recommendation with noticeable gaps or oversights
        - 2 = Inconsistent recommendation that misinterprets key account signals
        - 1 = Completely disproportionate or inappropriate intervention

Provide a detailed rationale for your score, highlighting how the recommendation reflects (or fails to reflect) the nuanced account context.
      output_type: number
      model_name: us.anthropic.claude-haiku-4-5-20251001-v1:0
      field_value_range:
        lower_bound: 1.0
        upper_bound: 5.0
      function: custom_prompt
  agent_span_filters:
  - agent:
      value: account-health-agent
    workflow:
      value: generate_intervention
    task:
      value: recommend_action
    span_name:
      value: generate_recommendation.ChatBedrockConverse.chat
  alert_conditions:
  - metric: NUMERIC_MEAN
    fields:
    - intervention_proportionality_score
    type: threshold
    operator: LT
    threshold_value: 3.5
  sensitivity: high
  schedule:
    type: fixed
    interval_minutes: 60
    start_time: '2026-06-09T02:25:00+00:00'
  notes: This monitor independently evaluates the context gathered from key churn metrics and against the provided recommendation. Key scenarios this monitor is designed to capture are whether or not a single, isolated metric has an outsized effect on the eventual recommendation.
  description: Account Health Agent Recommendation Rationalization
  audiences:
  - Databricks
  high_segment_count: false
  aggregate_by: HOUR
  time_bucketed: true
  collection_lag_hours: 0
  sampling_config:
    percentage: 100.0
    count: 200
